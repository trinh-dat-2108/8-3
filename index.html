<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chúc mừng 8/3</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      overflow: hidden;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.18);
      animation: fadeInUp 1s ease;
      position: relative;
    }

    .flower {
      font-size: 42px;
      margin-bottom: 12px;
      animation: float 2.5s ease-in-out infinite;
    }

    h1 {
      font-size: 34px;
      color: #e8436f;
      margin-bottom: 16px;
    }

    p {
      font-size: 18px;
      line-height: 1.7;
      color: #444;
      margin-bottom: 24px;
    }

    button {
      background: linear-gradient(135deg, #ff4d6d, #ff758f);
      color: white;
      border: none;
      padding: 14px 28px;
      font-size: 17px;
      font-weight: 600;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 18px rgba(255, 77, 109, 0.35);
    }

    button:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 12px 24px rgba(255, 77, 109, 0.45);
    }

    #msg {
      margin-top: 22px;
      font-size: 18px;
      font-weight: 500;
      color: #d6336c;
      min-height: 30px;
      transition: 0.3s;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-8px);
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="flower">🌸</div>
    <h1>Chúc mừng ngày Quốc tế Phụ nữ 8/3</h1>

    <p>
      Chúc bạn luôn xinh đẹp, mạnh mẽ, hạnh phúc và thành công trên con đường mình chọn.
      Cảm ơn bạn vì đã mang đến sự dịu dàng, ấm áp và những điều tốt đẹp cho cuộc sống này.
    </p>

    <button onclick="showMessage()">Nhận lời chúc</button>
    <p id="msg"></p>
  </div>

  <script>
    function showMessage() {
      const msg = document.getElementById("msg");
      msg.innerHTML = "🌷 Chúc bạn một ngày 8/3 thật rạng rỡ, vui vẻ và ngập tràn yêu thương! 💖";
    }
  </script>
</body>
</html>
