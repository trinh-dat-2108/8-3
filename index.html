<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chúc mừng 8/3</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow: hidden;
      background: linear-gradient(135deg, #efc1cb, #e7b4c0, #f3d3d9);
      position: relative;
    }

    .bg-blur {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      z-index: 0;
      animation: moveBlob 8s ease-in-out infinite;
    }

    .bg-blur.one {
      width: 260px;
      height: 260px;
      background: #ffd1dc;
      top: 10%;
      left: 10%;
    }

    .bg-blur.two {
      width: 320px;
      height: 320px;
      background: #f7b8c7;
      bottom: 8%;
      right: 8%;
      animation-delay: 1.5s;
    }

    .petals {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }

    .petal {
      position: absolute;
      top: -40px;
      animation: fall linear infinite;
      opacity: 0.85;
      user-select: none;
    }

    .card {
      width: 100%;
      max-width: 920px;
      background: rgba(250, 247, 248, 0.95);
      border-radius: 34px;
      padding: 60px 50px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.12);
      position: relative;
      z-index: 2;
      animation: cardIn 1s ease;
      backdrop-filter: blur(6px);
    }

    .flower {
      font-size: 54px;
      margin-bottom: 20px;
      animation: floatFlower 2.4s ease-in-out infinite;
    }

    h1 {
      color: #d65277;
      font-size: 60px;
      font-weight: 800;
      line-height: 1.18;
      margin-bottom: 32px;
      text-shadow: 0 2px 10px rgba(214, 82, 119, 0.08);
    }

    button {
      padding: 20px 42px;
      font-size: 28px;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #ef6a86, #dd6f8d);
      border: none;
      border-radius: 20px;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(223, 120, 147, 0.35);
      transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.4s ease;
      animation: pulse 1.8s infinite;
    }

    button:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 16px 32px rgba(223, 120, 147, 0.45);
    }

    button.hide {
      opacity: 0;
      transform: scale(0.8);
      pointer-events: none;
      display: none;
    }

    #msg {
      max-width: 760px;
      margin: 0 auto;
      font-size: 0;
      line-height: 1.8;
      color: #4a4547;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.7s ease;
      max-height: 0;
      overflow: hidden;
    }

    #msg.show {
      font-size: 28px;
      opacity: 1;
      transform: translateY(0);
      max-height: 500px;
      margin-top: 34px;
      padding: 18px 10px 0;
    }

    .spark {
      position: absolute;
      font-size: 22px;
      pointer-events: none;
      animation: sparkFly 1s ease-out forwards;
      z-index: 3;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes floatFlower {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-8px);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.03);
      }
    }

    @keyframes fall {
      0% {
        transform: translateY(-40px) translateX(0) rotate(0deg);
      }
      100% {
        transform: translateY(110vh) translateX(40px) rotate(360deg);
      }
    }

    @keyframes sparkFly {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(0.7);
      }
      100% {
        opacity: 0;
        transform: translate(var(--x), var(--y)) scale(1.4);
      }
    }

    @keyframes moveBlob {
      0%, 100% {
        transform: translate(0, 0) scale(1);
      }
      50% {
        transform: translate(20px, -20px) scale(1.08);
      }
    }

    @media (max-width: 768px) {
      .card {
        padding: 42px 24px;
        border-radius: 24px;
      }

      h1 {
        font-size: 40px;
      }

      button {
        font-size: 22px;
        padding: 16px 28px;
      }

      #msg.show {
        font-size: 22px;
      }

      .flower {
        font-size: 42px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-blur one"></div>
  <div class="bg-blur two"></div>

  <div class="petals" id="petals"></div>

  <div class="card" id="card">
    <div class="flower">🌸</div>

    <h1>Chúc mừng ngày Quốc tế Phụ nữ 8/3</h1>

    <button id="wishBtn" type="button" onclick="showMessage()">Nhận lời chúc</button>

    <div id="msg"></div>
  </div>

  <script>
    const petalsContainer = document.getElementById("petals");

    for (let i = 0; i < 18; i++) {
      createPetal();
    }

    function createPetal() {
      const petal = document.createElement("span");
      petal.className = "petal";
      petal.textContent = Math.random() > 0.5 ? "🌸" : "💮";

      petal.style.left = Math.random() * 100 + "vw";
      petal.style.fontSize = 18 + Math.random() * 20 + "px";
      petal.style.animationDuration = 8 + Math.random() * 8 + "s";
      petal.style.animationDelay = Math.random() * 8 + "s";

      petalsContainer.appendChild(petal);
    }

    function showMessage() {
      const msg = document.getElementById("msg");
      const btn = document.getElementById("wishBtn");

      msg.innerHTML = `
        Chúc bạn luôn xinh đẹp, mạnh mẽ, hạnh phúc và thành công trên con đường mình chọn.
        Cảm ơn bạn vì đã mang đến sự dịu dàng, ấm áp và những điều tốt đẹp cho cuộc sống này. 💖
      `;

      msg.classList.add("show");
      btn.classList.add("hide");

      createSparkles();
    }

    function createSparkles() {
      const card = document.getElementById("card");
      const icons = ["✨", "💖", "🌸", "💫"];

      for (let i = 0; i < 14; i++) {
        const spark = document.createElement("span");
        spark.className = "spark";
        spark.textContent = icons[Math.floor(Math.random() * icons.length)];

        const x = (Math.random() - 0.5) * 340 + "px";
        const y = (Math.random() - 0.5) * 220 + "px";

        spark.style.left = "50%";
        spark.style.top = "52%";
        spark.style.setProperty("--x", x);
        spark.style.setProperty("--y", y);

        card.appendChild(spark);

        setTimeout(() => {
          spark.remove();
        }, 1000);
      }
    }
  </script>
</body>
</html>
