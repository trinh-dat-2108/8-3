<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chúc mừng 8/3</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: linear-gradient(135deg, #f3c6d0, #efb8c5, #f8dce2);
      padding: 20px;
      position: relative;
    }

    .petals {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .petal {
      position: absolute;
      top: -60px;
      opacity: 0.9;
      user-select: none;
      animation: fall linear infinite;
    }

    .card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 900px;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(8px);
      border-radius: 32px;
      padding: 58px 48px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.12);
      animation: floatCard 3s ease-in-out infinite;
    }

    .flower {
      font-size: 56px;
      margin-bottom: 16px;
      animation: flowerDance 2.4s ease-in-out infinite;
    }

    h1 {
      color: #d94f79;
      font-size: 56px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 34px;
      text-shadow: 0 0 12px rgba(217, 79, 121, 0.08);
      animation: glowTitle 2.2s ease-in-out infinite;
    }

    button {
      border: none;
      outline: none;
      color: white;
      font-size: 28px;
      font-weight: 700;
      padding: 18px 38px;
      border-radius: 18px;
      cursor: pointer;
      background: linear-gradient(135deg, #f06c8e, #df6f8d);
      box-shadow: 0 0 0 rgba(240, 108, 142, 0.45);
      animation: pulseButton 1.5s infinite;
      transition: transform 0.25s ease, opacity 0.45s ease;
    }

    button:hover {
      transform: scale(1.05);
    }

    button.hide {
      opacity: 0;
      transform: scale(0.75);
      pointer-events: none;
    }

    #msg {
      max-width: 760px;
      margin: 0 auto;
      color: #4a4547;
      font-size: 28px;
      line-height: 1.9;
      opacity: 0;
      transform: translateY(55px);
      filter: blur(8px);
      max-height: 0;
      overflow: hidden;
      transition:
        opacity 2.2s ease,
        transform 2.2s ease,
        filter 2.2s ease,
        max-height 2.6s ease;
    }

    #msg.show {
      margin-top: 34px;
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
      max-height: 700px;
    }

    .burst {
      position: absolute;
      left: 50%;
      top: 52%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 3;
    }

    .burst span {
      position: absolute;
      font-size: 28px;
      animation: explode 1s ease-out forwards;
    }

    @keyframes fall {
      0% {
        transform: translateY(-60px) translateX(0) rotate(0deg);
      }
      100% {
        transform: translateY(110vh) translateX(40px) rotate(360deg);
      }
    }

    @keyframes pulseButton {
      0% {
        box-shadow: 0 0 0 0 rgba(240, 108, 142, 0.5);
      }
      70% {
        box-shadow: 0 0 0 22px rgba(240, 108, 142, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(240, 108, 142, 0);
      }
    }

    @keyframes flowerDance {
      0%, 100% {
        transform: translateY(0) rotate(0deg) scale(1);
      }
      50% {
        transform: translateY(-8px) rotate(8deg) scale(1.08);
      }
    }

    @keyframes glowTitle {
      0%, 100% {
        text-shadow: 0 0 0 rgba(217, 79, 121, 0);
      }
      50% {
        text-shadow: 0 0 18px rgba(217, 79, 121, 0.2);
      }
    }

    @keyframes floatCard {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-6px);
      }
    }

    @keyframes explode {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(0.6);
      }
      100% {
        opacity: 0;
        transform: translate(var(--x), var(--y)) scale(1.5);
      }
    }

    @media (max-width: 768px) {
      .card {
        padding: 40px 24px;
        border-radius: 24px;
      }

      .flower {
        font-size: 42px;
      }

      h1 {
        font-size: 36px;
        margin-bottom: 28px;
      }

      button {
        font-size: 21px;
        padding: 15px 24px;
        border-radius: 14px;
      }

      #msg {
        font-size: 21px;
        transform: translateY(60px);
        filter: blur(10px);
        transition:
          opacity 2.8s ease,
          transform 2.8s ease,
          filter 2.8s ease,
          max-height 3.2s ease;
      }

      #msg.show {
        margin-top: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="petals" id="petals"></div>

  <div class="card" id="card">
    <div class="flower">🌸</div>
    <h1>Chúc mừng ngày Quốc tế Phụ nữ 8/3</h1>

    <button id="wishBtn" type="button" onclick="showMessage()">Nhận lời chúc</button>

    <div id="msg"></div>
  </div>

  <script>
    const petals = document.getElementById("petals");

    for (let i = 0; i < 24; i++) {
      const petal = document.createElement("div");
      petal.className = "petal";
      petal.textContent = Math.random() > 0.5 ? "🌸" : "💮";
      petal.style.left = Math.random() * 100 + "vw";
      petal.style.fontSize = (18 + Math.random() * 18) + "px";
      petal.style.animationDuration = (7 + Math.random() * 6) + "s";
      petal.style.animationDelay = (Math.random() * 6) + "s";
      petals.appendChild(petal);
    }

    function showMessage() {
      const msg = document.getElementById("msg");
      const btn = document.getElementById("wishBtn");
      const card = document.getElementById("card");

      msg.innerHTML = `
        Chúc bạn có một ngày 8/3 thật vui vẻ, nhẹ nhàng và tràn đầy tiếng cười.
        Mong rằng mỗi ngày trôi qua đều mang đến cho bạn nhiều niềm vui, nhiều điều tích cực và những trải nghiệm đáng nhớ.
        <br><br>
        Hy vọng bạn luôn gặp nhiều may mắn, thuận lợi trong học tập, công việc cũng như trong cuộc sống.
        Chúc cho mọi dự định và mục tiêu của bạn đều dần trở thành hiện thực, và bạn luôn giữ được tinh thần lạc quan để đón nhận những điều tốt đẹp phía trước. 🌷
      `;

      msg.classList.add("show");
      btn.classList.add("hide");

      setTimeout(() => {
        btn.style.display = "none";
      }, 450);

      createBurst(card);
    }

    function createBurst(card) {
      const burst = document.createElement("div");
      burst.className = "burst";

      const icons = ["💖", "✨", "🌸", "💫", "🌷"];
      for (let i = 0; i < 18; i++) {
        const item = document.createElement("span");
        item.textContent = icons[Math.floor(Math.random() * icons.length)];

        const angle = (Math.PI * 2 * i) / 18;
        const distance = 90 + Math.random() * 90;
        const x = Math.cos(angle) * distance + "px";
        const y = Math.sin(angle) * distance + "px";

        item.style.setProperty("--x", x);
        item.style.setProperty("--y", y);
        item.style.animationDelay = (Math.random() * 0.15) + "s";

        burst.appendChild(item);
      }

      card.appendChild(burst);

      setTimeout(() => {
        burst.remove();
      }, 1200);
    }
  </script>
</body>
</html>
