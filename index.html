<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chúc mừng 8/3</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #e6bfc6;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 900px;
      background: #f7f4f5;
      border-radius: 30px;
      padding: 60px 50px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
    }

    .flower {
      font-size: 50px;
      margin-bottom: 20px;
    }

    h1 {
      color: #d65277;
      font-size: 64px;
      font-weight: bold;
      line-height: 1.2;
      margin-bottom: 35px;
    }

    button {
      padding: 20px 40px;
      font-size: 28px;
      font-weight: bold;
      color: white;
      background: linear-gradient(135deg, #ef6a86, #df7893);
      border: none;
      border-radius: 20px;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(223, 120, 147, 0.35);
      transition: 0.3s;
    }

    button:hover {
      transform: translateY(-3px);
    }

    #msg {
      display: none;
      font-size: 28px;
      color: #444;
      line-height: 1.8;
      margin-top: 35px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="flower">🌸</div>

    <h1>Chúc mừng ngày Quốc tế Phụ nữ 8/3</h1>

    <button id="wishBtn" onclick="showMessage()">Nhận lời chúc</button>

    <div id="msg">
      Chúc bạn luôn xinh đẹp, mạnh mẽ, hạnh phúc và thành công trên con đường mình chọn.
      Cảm ơn bạn vì đã mang đến sự dịu dàng, ấm áp và những điều tốt đẹp cho cuộc sống này. 💖
    </div>
  </div>

  <script>
    function showMessage() {
      document.getElementById("msg").style.display = "block";
      document.getElementById("wishBtn").style.display = "none";
    }
  </script>
</body>
</html>
