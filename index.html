<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chúc mừng 8/3</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 550px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.18);
    }

    .flower {
      font-size: 42px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 32px;
      color: #e8436f;
      margin-bottom: 24px;
    }

    button {
      background: linear-gradient(135deg, #ff4d6d, #ff758f);
      color: white;
      border: none;
      padding: 14px 28px;
      font-size: 17px;
      font-weight: 600;
      border-radius: 14px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 8px 18px rgba(255, 77, 109, 0.35);
    }

    button:hover {
      transform: translateY(-3px);
    }

    #msg[hidden] {
      display: none !important;
    }

    #msg {
      margin-top: 24px;
      padding: 18px;
      border-radius: 16px;
      background: #fff0f3;
      font-size: 18px;
      font-weight: 500;
      color: #d6336c;
      line-height: 1.7;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="flower">🌸</div>
    <h1>Chúc mừng 8/3</h1>

    <button id="wishBtn" onclick="showMessage()">Nhận lời chúc</button>

    <div id="msg" hidden>
      🌷 Chúc bạn luôn xinh đẹp, hạnh phúc, mạnh mẽ và thành công.
      Mong rằng mỗi ngày của bạn đều ngập tràn niềm vui, yêu thương và những điều tốt đẹp nhất. 💖
    </div>
  </div>

  <script>
    function showMessage() {
      document.getElementById("msg").hidden = false;
      document.getElementById("wishBtn").style.display = "none";
    }
  </script>
</body>
</html>
